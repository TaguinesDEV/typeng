function show_infobox() {
    infobox.style.display = "block";
    const w = infobox.offsetWidth;
    const h = infobox.offsetHeight;
    infobox.style.left = (window.innerWidth - w) / 2 + "px";
    infobox.style.top = (window.innerHeight - h) / 2 + "px";
}

globalThis.__canvas_resized = () => {}

const APP_WIDTH = 430
const APP_HEIGHT = 760

function appRect() {
    const canvasEl = document.getElementById("canvas")
    return canvasEl ? canvasEl.getBoundingClientRect() : null
}

function scaleRect(x, y, width, height) {
    const rect = appRect()
    if (!rect) {
        return null
    }

    const scaleX = rect.width / APP_WIDTH
    const scaleY = rect.height / APP_HEIGHT

    return {
        left: rect.left + x * scaleX,
        top: rect.top + y * scaleY,
        width: width * scaleX,
        height: height * scaleY,
    }
}

function placeElement(element, x, y, width, height) {
    const box = scaleRect(x, y, width, height)
    if (!box || !element) {
        return
    }

    element.style.left = `${box.left}px`
    element.style.top = `${box.top}px`
    element.style.width = `${box.width}px`
    element.style.height = `${box.height}px`
}

function updateOverlayLayout() {
    placeElement(document.getElementById("loginUsernameInput"), 55, 238, 320, 56)
    placeElement(document.getElementById("loginPasswordInput"), 55, 334, 320, 56)
    placeElement(document.getElementById("gameTypingInput"), 45, 500, 340, 84)
}

function showLoginInputs(username = "", password = "") {
    const overlay = document.getElementById("mobileLoginOverlay")
    const usernameInput = document.getElementById("loginUsernameInput")
    const passwordInput = document.getElementById("loginPasswordInput")

    usernameInput.value = username ?? ""
    passwordInput.value = password ?? ""
    overlay.hidden = false
    updateOverlayLayout()
}

function hideLoginInputs() {
    document.getElementById("mobileLoginOverlay").hidden = true
}

function getLoginFormValues() {
    return {
        username: document.getElementById("loginUsernameInput").value,
        password: document.getElementById("loginPasswordInput").value,
    }
}

function showGameInput(value = "") {
    const overlay = document.getElementById("mobileGameOverlay")
    const input = document.getElementById("gameTypingInput")
    input.value = value ?? ""
    overlay.hidden = false
    updateOverlayLayout()
}

function hideGameInput() {
    document.getElementById("mobileGameOverlay").hidden = true
}

function getGameInputValue() {
    return document.getElementById("gameTypingInput").value
}

function setGameInputValue(value = "") {
    document.getElementById("gameTypingInput").value = value ?? ""
}

function popOverlayAction() {
    const action = window.overlayAction ?? null
    window.overlayAction = null
    return action
}

async function custom_onload(debug_hidden) {
    pyconsole.hidden = debug_hidden
    system.hidden = debug_hidden
    transfer.hidden = debug_hidden
    info.hidden = debug_hidden
    box.hidden = debug_hidden

    const canvasEl = document.getElementById("canvas")
    if (canvasEl) {
        canvasEl.style.outline = "none"
        canvasEl.addEventListener("pointerdown", () => canvasEl.focus())
        canvasEl.addEventListener("touchstart", () => canvasEl.focus(), { passive: true })
    }

    const usernameInput = document.getElementById("loginUsernameInput")
    const passwordInput = document.getElementById("loginPasswordInput")
    const gameTypingInput = document.getElementById("gameTypingInput")

    usernameInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
            event.preventDefault()
            passwordInput.focus()
        }
    })

    passwordInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
            event.preventDefault()
            window.overlayAction = "login"
        }
    })

    gameTypingInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
            event.preventDefault()
            window.overlayAction = "submit"
        }
    })

    window.addEventListener("resize", updateOverlayLayout)
    window.addEventListener("orientationchange", updateOverlayLayout)
    updateOverlayLayout()
    show_infobox()
}

function custom_prerun() {}
function custom_postrun() {}
