const APP_WIDTH = 430
const APP_HEIGHT = 760
let deferredInstallPrompt = null
const APP_BUTTON_POINTS = {

function appRect() {
    const canvasEl = document.getElementById("canvas")
    return canvasEl ? canvasEl.getBoundingClientRect() : null
}

function scaleRect(x, y, width, height) {
    const rect = appRect()
    if (!rect) {
        return null
    }

    const scaleX = rect.width / APP_WIDTH
    const scaleY = rect.height / APP_HEIGHT

    return {
        left: rect.left + x * scaleX,
        top: rect.top + y * scaleY,
        width: width * scaleX,
        height: height * scaleY,
    }
}

function placeElement(element, x, y, width, height) {
    const box = scaleRect(x, y, width, height)
    if (!box || !element) {
        return
    }

    element.style.left = `${box.left}px`
    element.style.top = `${box.top}px`
    element.style.width = `${box.width}px`
    element.style.height = `${box.height}px`
}

function updateOverlayLayout() {

function dispatchCanvasTap(appX, appY) {
    const canvasEl = document.getElementById("canvas")
    const rect = appRect()
    if (!canvasEl || !rect) {
        return
    }

    const clientX = rect.left + (appX / APP_WIDTH) * rect.width
    const clientY = rect.top + (appY / APP_HEIGHT) * rect.height

    if (window.PointerEvent) {
        canvasEl.dispatchEvent(new PointerEvent("pointerdown", {
            bubbles: true,
            cancelable: true,
            clientX,
            clientY,
            pointerId: 1,
            pointerType: "touch",
            isPrimary: true,
            button: 0,
            buttons: 1,
        }))
        canvasEl.dispatchEvent(new PointerEvent("pointerup", {
            bubbles: true,
            cancelable: true,
            clientX,
            clientY,
            pointerId: 1,
            pointerType: "touch",
            isPrimary: true,
            button: 0,
            buttons: 0,
        }))
    }

    canvasEl.dispatchEvent(new MouseEvent("mousedown", {
        bubbles: true,
        cancelable: true,
        clientX,
        clientY,
        button: 0,
        buttons: 1,
    }))
    canvasEl.dispatchEvent(new MouseEvent("mouseup", {
        bubbles: true,
        cancelable: true,
        clientX,
        clientY,
        button: 0,
        buttons: 0,
    }))
    canvasEl.dispatchEvent(new MouseEvent("click", {
        bubbles: true,
        cancelable: true,
        clientX,
        clientY,
        button: 0,
    }))
}

function submitOverlayAction(action, event) {
    if (event) {
        event.preventDefault()
        event.stopPropagation()
    }

    const actionField = document.getElementById("overlayActionValue")
    if (actionField) {
        actionField.value = action ?? ""
    }
    window.overlayAction = action

    const buttonPoint = APP_BUTTON_POINTS[action]
    if (buttonPoint) {
        window.setTimeout(() => dispatchCanvasTap(buttonPoint.x, buttonPoint.y), 0)
    }

    return false
}

function openInstallFromButton(event) {

function isStandaloneApp() {
    return window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true
}

function browserInstallInstructions() {
    const ua = navigator.userAgent || ""
    const isIOS = /iPhone|iPad|iPod/i.test(ua)
    const isMessenger = /Messenger/i.test(ua)

    if (isIOS) {
        return "On iPhone, open this page in Safari, tap Share, then choose Add to Home Screen."
    }

    if (isMessenger) {
        return "Messenger's in-app browser may not support install. Open this page in Chrome or your main browser, then use Add to Home screen."
    }

    return "If your browser does not show an install prompt, open the browser menu and choose Install app or Add to Home screen."
}

function showInstallModal() {
    document.getElementById("installModal").hidden = false
}

function hideInstallModal() {
    document.getElementById("installModal").hidden = true
}

function bindButtonPress(element, handler) {
    if (!element) {
        return
    }

    let lastPointerEventTime = -Infinity
    const activate = (event) => {
        event.preventDefault()
        event.stopPropagation()
        handler(event)
    }

    if (window.PointerEvent) {
        element.addEventListener("pointerup", (event) => {
            lastPointerEventTime = event.timeStamp
            activate(event)
        })
    }

    element.addEventListener("touchend", (event) => {
        activate(event)
    }, { passive: false })

    element.addEventListener("click", (event) => {
        if (event.timeStamp - lastPointerEventTime < 700) {
            event.preventDefault()
            event.stopPropagation()
            return
        }

        activate(event)
    })
}

function setInstallModalState() {
    const title = document.getElementById("installModalTitle")
    const body = document.getElementById("installModalBody")
    const action = document.getElementById("installNowButton")

    if (isStandaloneApp()) {
        title.textContent = "Already Installed"
        body.textContent = "Typing Master is already installed or opened like an app on this device."
        action.hidden = true
        return
    }

    if (deferredInstallPrompt) {
        title.textContent = "Install Typing Master"
        body.textContent = "Your browser is ready to install Typing Master. Tap Install now to add it to your phone."
        action.hidden = false
        return
    }

    title.textContent = "Install App"
    body.textContent = browserInstallInstructions()
    action.hidden = true
}

async function triggerInstallPrompt() {
    if (!deferredInstallPrompt) {
        setInstallModalState()
        return
    }

    const promptEvent = deferredInstallPrompt
    deferredInstallPrompt = null
    hideInstallModal()

    await promptEvent.prompt()
    try {
        await promptEvent.userChoice
    } catch (error) {
        console.warn(error)
    }

    setInstallModalState()
}

function requestInstallApp() {
    setInstallModalState()
    showInstallModal()
}

async function custom_onload(debug_hidden) {
    pyconsole.hidden = debug_hidden
    system.hidden = debug_hidden
    transfer.hidden = debug_hidden
    info.hidden = debug_hidden
    box.hidden = debug_hidden

    const canvasEl = document.getElementById("canvas")
    if (canvasEl) {
        canvasEl.style.outline = "none"
        canvasEl.addEventListener("pointerdown", () => canvasEl.focus())
        canvasEl.addEventListener("touchstart", () => canvasEl.focus(), { passive: true })
    }

    const usernameInput = document.getElementById("loginPanelUsername")
    const passwordInput = document.getElementById("loginPanelPassword")
    const gameTypingInput = document.getElementById("gameTypingInput")
    const loginButton = document.getElementById("loginPanelLogin")
    const registerButton = document.getElementById("loginPanelRegister")
    const rankingButton = document.getElementById("loginPanelRanking")
    const installButton = document.getElementById("loginPanelInstall")
    const menuStartButton = document.getElementById("menuPanelStart")
    const menuRankingButton = document.getElementById("menuPanelRanking")
    const menuLogoutButton = document.getElementById("menuPanelLogout")
    const menuInstallButton = document.getElementById("menuPanelInstall")
    const installNowButton = document.getElementById("installNowButton")
    const closeInstallButton = document.getElementById("closeInstallModal")
    const installModal = document.getElementById("installModal")

    usernameInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
            event.preventDefault()
            passwordInput.focus()
        }
    })

    passwordInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
            submitOverlayAction("login", event)
        }
    })

    bindButtonPress(loginButton, (event) => {
        submitOverlayAction("login", event)
    })

    bindButtonPress(registerButton, (event) => {
        submitOverlayAction("register", event)
    })

    bindButtonPress(rankingButton, (event) => {
        submitOverlayAction("ranking", event)
    })

    bindButtonPress(installButton, () => {
        requestInstallApp()
    })

    bindButtonPress(menuStartButton, (event) => {
        submitOverlayAction("start", event)
    })

    bindButtonPress(menuRankingButton, (event) => {
        submitOverlayAction("menu-ranking", event)
    })

    bindButtonPress(menuLogoutButton, (event) => {
        submitOverlayAction("logout", event)
    })

    bindButtonPress(menuInstallButton, () => {
        requestInstallApp()
    })

    bindButtonPress(installNowButton, () => {
        triggerInstallPrompt()
    })

    bindButtonPress(closeInstallButton, () => {
        hideInstallModal()
    })

    installModal.addEventListener("click", (event) => {
        if (event.target === installModal) {
            hideInstallModal()
        }
    })

    document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && !installModal.hidden) {
            hideInstallModal()
        }
    })

    gameTypingInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
            submitOverlayAction("submit", event)
        }
    })

    window.addEventListener("resize", updateOverlayLayout)
    window.addEventListener("orientationchange", updateOverlayLayout)
    window.addEventListener("beforeinstallprompt", (event) => {
        event.preventDefault()
        deferredInstallPrompt = event
        setInstallModalState()
    })
    window.addEventListener("appinstalled", () => {
        deferredInstallPrompt = null
        setInstallModalState()
        setLoginMessage("Typing Master was installed.")
    })

    if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
            navigator.serviceWorker
                .register("./service-worker.js?v=2")
                .then((registration) => registration.update())
                .catch((error) => console.warn(error))
        })
    }

    updateOverlayLayout()
    setInstallModalState()
    show_infobox()
}

    <div id="mobileLoginPanel" class="web-login" hidden>

                <label class="web-login-label" for="loginPanelUsername">USERNAME</label>

                <label class="web-login-label" for="loginPanelPassword">PASSWORD</label>
                <input id="loginPanelPassword" class="web-login-field" type="password" inputmode="text" autocomplete="current-password" autocapitalize="none" spellcheck="false" placeholder="Enter password">
                <div id="loginPanelMessage" class="web-login-message"></div>
                <div class="web-login-grid">
                    <button id="loginPanelLogin" class="web-login-button login" type="button" onclick="return submitOverlayAction('login', event)" ontouchend="return submitOverlayAction('login', event)" onpointerup="return submitOverlayAction('login', event)">LOG IN</button>
                    <button id="loginPanelRegister" class="web-login-button register" type="button" onclick="return submitOverlayAction('register', event)" ontouchend="return submitOverlayAction('register', event)" onpointerup="return submitOverlayAction('register', event)">REGISTER</button>
                    <button id="loginPanelRanking" class="web-login-button ranking" type="button" onclick="return submitOverlayAction('ranking', event)" ontouchend="return submitOverlayAction('ranking', event)" onpointerup="return submitOverlayAction('ranking', event)">RANKING</button>
                    <button id="loginPanelInstall" class="web-login-button install" type="button" onclick="return openInstallFromButton(event)" ontouchend="return openInstallFromButton(event)" onpointerup="return openInstallFromButton(event)">INSTALL APP</button>
                </div>
                <p class="web-login-tip">Tip: tap the fields and use your phone keyboard normally.</p>
            </div>
        </div>
    </div>
    <div id="mobileMenuPanel" class="web-login" hidden>
        <div class="web-login-inner">
            <h1 class="web-login-title">Welcome</h1>
            <p id="menuPanelUsername" class="web-login-subtitle"></p>
            <div class="web-login-card">
                <div class="web-menu-stats">
                    <div class="web-menu-stat">
                        <p class="web-menu-stat-label">BEST SCORE</p>
                        <p id="menuPanelBestScore" class="web-menu-stat-value">0</p>
                    </div>
                    <div class="web-menu-stat">
                        <p class="web-menu-stat-label">GAMES PLAYED</p>
                        <p id="menuPanelGamesPlayed" class="web-menu-stat-value">0</p>
                    </div>
                </div>
                <div id="menuPanelMessage" class="web-login-message"></div>
                <div class="web-login-grid">
                    <button id="menuPanelStart" class="web-login-button login" type="button" onclick="return submitOverlayAction('start', event)" ontouchend="return submitOverlayAction('start', event)" onpointerup="return submitOverlayAction('start', event)">START</button>
                    <button id="menuPanelRanking" class="web-login-button register" type="button" onclick="return submitOverlayAction('menu-ranking', event)" ontouchend="return submitOverlayAction('menu-ranking', event)" onpointerup="return submitOverlayAction('menu-ranking', event)">RANKING</button>
                    <button id="menuPanelLogout" class="web-login-button ranking" type="button" onclick="return submitOverlayAction('logout', event)" ontouchend="return submitOverlayAction('logout', event)" onpointerup="return submitOverlayAction('logout', event)">LOG OUT</button>

                </div>
            </div>
        </div>

                <button id="closeInstallModal" class="install-modal-button secondary" type="button" onclick="return closeInstallFromButton(event)" ontouchend="return closeInstallFromButton(event)" onpointerup="return closeInstallFromButton(event)">Close</button>

            <div id="info" class="trinfo"></div>

width="470px" height="90%"
